<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kartiki Resin Arts – Admin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:system-ui,-apple-system,sans-serif;
      background:#fff5fb;
      color:#333;
      line-height:1.6;
    }
    a{text-decoration:none;color:inherit;}

    .page{
      max-width:1200px;
      margin:0 auto;
      padding:1.5rem 1rem 3rem;
      display:none; /* lock साठी - JS मधून true करू */
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:1.5rem;
    }
    .logo{
      display:flex;
      align-items:center;
      gap:0.6rem;
    }
    .logo-circle{
      width:40px;
      height:40px;
      border-radius:50%;
      background:linear-gradient(135deg,#b02e72,#8b1a62);
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      font-weight:800;
    }
    h1{
      font-size:1.3rem;
      color:#8b1a62;
    }
    .back-link{
      padding:0.5rem 1rem;
      border-radius:999px;
      border:1px solid #e5c9e8;
      background:#fff;
      font-size:0.9rem;
      cursor:pointer;
    }

    .card{
      background:#ffffff;
      border-radius:18px;
      padding:1.5rem 1.4rem;
      box-shadow:0 10px 35px rgba(0,0,0,0.08);
      margin-bottom:1.5rem;
      border:1px solid #f1d9ee;
    }

    .card-title{
      font-weight:700;
      margin-bottom:1rem;
      color:#9b1b63;
    }

    form{
      display:grid;
      gap:1rem;
    }

    .field-row{
      display:grid;
      grid-template-columns:1fr 2fr;
      gap:0.8rem;
      align-items:center;
    }

    label{
      font-size:0.9rem;
      color:#555;
    }

    input,select,textarea{
      width:100%;
      padding:0.6rem 0.75rem;
      border-radius:10px;
      border:1px solid #e0c7df;
      font-size:0.9rem;
      font-family:inherit;
    }
    textarea{min-height:70px;resize:vertical;}
    input:focus,select:focus,textarea:focus{
      outline:none;
      border-color:#b02e72;
      box-shadow:0 0 0 2px rgba(176,46,114,0.15);
    }

    .btn-primary{
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg,#b02e72,#8b1a62);
      color:#fff;
      padding:0.7rem 1.6rem;
      font-weight:700;
      cursor:pointer;
      margin-top:0.3rem;
      justify-self:flex-start;
    }

    .products-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:0.8rem;
      gap:1rem;
    }
    .products-top span{
      font-size:0.9rem;
      color:#666;
    }

    .product-list{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:1rem;
    }

    .product-item{
      background:#fff;
      border-radius:14px;
      border:1px solid #f1d9ee;
      padding:0.9rem;
      display:flex;
      gap:0.8rem;
    }

    .thumb{
      width:80px;
      height:80px;
      border-radius:10px;
      background:#ffe5f5;
      overflow:hidden;
      flex-shrink:0;
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .p-main{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:0.3rem;
    }
    .p-name{
      font-weight:700;
      font-size:0.95rem;
    }
    .p-meta{
      font-size:0.83rem;
      color:#777;
    }
    .p-actions{
      margin-top:0.4rem;
      display:flex;
      gap:0.4rem;
      flex-wrap:wrap;
    }
    .btn-small{
      border-radius:999px;
      border:1px solid #f1c4da;
      padding:0.25rem 0.7rem;
      font-size:0.78rem;
      cursor:pointer;
      background:#fff8fc;
      color:#b02e72;
    }
    .btn-danger{
      border-color:#f3a6b4;
      background:#ffe6ea;
      color:#c53030;
    }

    .empty-text{
      font-size:0.9rem;
      color:#777;
      text-align:center;
      padding:1rem 0.5rem;
    }

    /* lock screen (simple) */
    .lock-screen{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:radial-gradient(circle at top,#ffe6f8 0,#fff5fb 45%,#ffffff 100%);
      z-index:100;
    }
    .lock-box{
      background:#ffffff;
      border-radius:18px;
      padding:1.5rem 1.8rem;
      box-shadow:0 10px 40px rgba(0,0,0,0.15);
      max-width:320px;
      width:100%;
      text-align:center;
      border:1px solid #f1d9ee;
    }
    .lock-box h2{
      margin-bottom:0.8rem;
      color:#9b1b63;
    }
    .lock-box p{
      font-size:0.9rem;
      color:#666;
      margin-bottom:0.8rem;
    }
    .lock-box input{
      margin-bottom:0.8rem;
      text-align:center;
    }

    @media(max-width:768px){
      .field-row{
        grid-template-columns:1fr;
      }
      .top-bar{
        flex-direction:column;
        align-items:flex-start;
        gap:0.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- SIMPLE LOCK -->
  <div class="lock-screen" id="lockScreen">
    <div class="lock-box">
      <h2>Admin Login</h2>
      <p>Password टाका</p>
      <input type="password" id="adminPass" placeholder="Admin password" />
      <button class="btn-primary" style="width:100%;justify-content:center;" onclick="checkPassword()">
        Unlock
      </button>
    </div>
  </div>

  <div class="page" id="page">
    <header class="top-bar">
      <div class="logo">
        <div class="logo-circle">K</div>
        <h1>Kartiki Resin – Admin</h1>
      </div>
      <button class="back-link" onclick="goHome()">← Back to website</button>
    </header>

    <!-- ADD PRODUCT -->
    <section class="card">
      <h2 class="card-title">➕ Add / Update Product</h2>
      <form id="productForm">
        <div class="field-row">
          <label for="name">Product name *</label>
          <input id="name" required />
        </div>
        <div class="field-row">
          <label for="price">Price (₹) *</label>
          <input id="price" type="number" min="0" step="1" required />
        </div>
        <div class="field-row">
          <label for="category">Category *</label>
          <select id="category" required>
            <option value="">Select category</option>
            <option>Coasters</option>
            <option>Jewellery</option>
            <option>Keychains</option>
            <option>Pooja Thali</option>
            <option>Home Decor</option>
          </select>
        </div>

        <!-- 1) DEVICE GALLERY मधून फोटो -->
        <div class="field-row">
          <label>Product image *</label>
          <div>
            <input id="imageFile" type="file" accept="image/*" />
            <small style="display:block;font-size:0.8rem;color:#777;margin-top:0.2rem;">
              Phone / PC gallery मधून फोटो निवडा.
            </small>
            <div style="margin-top:0.5rem;">
              <img id="imagePreview" src="" alt="" style="max-width:120px;border-radius:10px;display:none;">
            </div>
          </div>
        </div>

        <!-- optional URL ठेवला आहे (जर direct link द्यायची असेल तर) -->
        <div class="field-row">
          <label for="image">Image URL (optional)</label>
          <input id="image" placeholder="https://..." />
        </div>

        <div class="field-row">
          <label for="description">Short description</label>
          <textarea id="description" placeholder="Beautiful handmade resin art..."></textarea>
        </div>

        <input type="hidden" id="editIndex" value="-1" />

        <button class="btn-primary" type="submit">💾 Save product</button>
      </form>
    </section>

    <!-- PRODUCT LIST -->
    <section class="card">
      <div class="products-top">
        <h2 class="card-title" style="margin-bottom:0;">📦 All Products</h2>
        <span id="countInfo">0 products</span>
      </div>
      <div id="productList" class="product-list"></div>
      <p id="emptyText" class="empty-text" style="display:none;">
        अजून एकही product add केलेले नाहीत. वरचा form भरून Save करा.
      </p>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "kartiki_products";   // index.html मध्ये हाच key वापर
    const ADMIN_PASSWORD = "kartiki2025";     // इथे स्वतःचा strong पासवर्ड ठेव

    /* ---------- 2) SIMPLE LOCK ---------- */
    function checkPassword(){
      const pass = document.getElementById("adminPass").value;
      if(pass === ADMIN_PASSWORD){
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("page").style.display = "block";
      }else{
        alert("Wrong password!");
      }
    }

    function goHome(){
      window.open("index.html","_blank");
    }

    /* ---------- localStorage helpers ---------- */
    function loadProducts(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      }catch(e){
        console.warn("Parse error",e);
        return [];
      }
    }

    function saveProducts(list){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    /* ---------- RENDER LIST ---------- */
    function renderProducts(){
      const listEl = document.getElementById("productList");
      const emptyEl = document.getElementById("emptyText");
      const countInfo = document.getElementById("countInfo");
      const products = loadProducts();

      listEl.innerHTML = "";

      if(!products.length){
        emptyEl.style.display = "block";
        countInfo.textContent = "0 products";
        return;
      }

      emptyEl.style.display = "none";
      countInfo.textContent = products.length + (products.length === 1 ? " product" : " products");

      products.forEach((p,index)=>{
        const item = document.createElement("article");
        item.className = "product-item";

        const imgSrc = p.image || "https://via.placeholder.com/160x160/b02e72/ffffff?text=Resin";

        item.innerHTML = `
          <div class="thumb">
            <img src="${imgSrc}" alt="${p.name}">
          </div>
          <div class="p-main">
            <div class="p-name">${p.name}</div>
            <div class="p-meta">
              ₹${Number(p.price).toLocaleString("en-IN")} • ${p.category || "Uncategorized"}
            </div>
            <div class="p-meta" style="max-height:3.2em;overflow:hidden;">
              ${(p.description || "").substring(0,80)}${(p.description && p.description.length>80)? "…" : ""}
            </div>
            <div class="p-actions">
              <button class="btn-small" onclick="editProduct(${index})">✏️ Edit</button>
              <button class="btn-small btn-danger" onclick="deleteProduct(${index})">🗑 Remove</button>
            </div>
          </div>
        `;
        listEl.appendChild(item);
      });
    }

    function resetForm(){
      document.getElementById("productForm").reset();
      document.getElementById("editIndex").value = -1;
      document.querySelector(".btn-primary").textContent = "💾 Save product";
      document.getElementById("imagePreview").style.display = "none";
    }

    /* ---------- 1) FILE INPUT → BASE64 IMAGE ---------- */
    const imageFileInput = document.getElementById("imageFile");
    const imagePreview = document.getElementById("imagePreview");
    let currentImageData = ""; // base64 string / URL

    imageFileInput.addEventListener("change", function(){
      const file = this.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(e){
        currentImageData = e.target.result;   // base64 data URL
        imagePreview.src = currentImageData;
        imagePreview.style.display = "block";
      };
      reader.readAsDataURL(file);            // device gallery मधून आलेला फोटो encode होतो [web:45][web:49]
    });

    /* ---------- ADD / UPDATE ---------- */
    document.getElementById("productForm").addEventListener("submit", function(e){
      e.preventDefault();
      const name = document.getElementById("name").value.trim();
      const price = document.getElementById("price").value;
      const category = document.getElementById("category").value;
      const urlImage = document.getElementById("image").value.trim();
      const description = document.getElementById("description").value.trim();
      const editIndex = Number(document.getElementById("editIndex").value);

      if(!name || !price || !category){
        alert("Name, price आणि category आवश्यक आहेत.");
        return;
      }

      // जर gallery मधून फोटो निवडलेला असेल तर तो वापर; नाहीतर URL वापर
      const finalImage = currentImageData || urlImage;

      const products = loadProducts();
      const productObj = { name, price:Number(price), category, image:finalImage, description };

      if(editIndex >= 0){
        products[editIndex] = productObj;
      }else{
        products.push(productObj);
      }

      saveProducts(products);          // index.html वर हाच data दिसेल
      currentImageData = "";
      resetForm();
      renderProducts();
    });

    /* ---------- EDIT ---------- */
    function editProduct(index){
      const products = loadProducts();
      const p = products[index];
      document.getElementById("name").value = p.name || "";
      document.getElementById("price").value = p.price || "";
      document.getElementById("category").value = p.category || "";
      document.getElementById("image").value = p.image || "";
      document.getElementById("description").value = p.description || "";
      document.getElementById("editIndex").value = index;
      document.querySelector(".btn-primary").textContent = "✅ Update product";

      if(p.image){
        imagePreview.src = p.image;
        imagePreview.style.display = "block";
        currentImageData = p.image;
      }else{
        imagePreview.style.display = "none";
        currentImageData = "";
      }
      window.scrollTo({top:0,behavior:"smooth"});
    }

    /* ---------- DELETE ---------- */
    function deleteProduct(index){
      if(!confirm("ह्या product ला खरंच delete करायचं आहे का?")) return;
      const products = loadProducts();
      products.splice(index,1);
      saveProducts(products);
      renderProducts();
    }

    /* ---------- INIT ---------- */
    document.addEventListener("DOMContentLoaded", function(){
      // lock screen default आहे, फक्त products list तयार करून ठेव
      renderProducts();
    });
  </script>
</body>
</html>
