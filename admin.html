<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kartiki Resin Arts - Admin Panel (Password Protected)</title>
  <style>
    * { box-sizing: border-box; }
    
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      margin:0; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    /* Login Screen */
    .login-container {
      background: white;
      padding: 2.5rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    
    .login-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #b02e72, #8b1a62);
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: white;
    }
    
    .login-title {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      color: #b02e72;
    }
    
    .login-subtitle {
      color: #666;
      margin-bottom: 2rem;
    }
    
    .password-input {
      width: 100%;
      padding: 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1rem;
      margin-bottom: 1.5rem;
      transition: border-color 0.2s;
    }
    
    .password-input:focus {
      outline: none;
      border-color: #b02e72;
    }
    
    .login-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #b02e72, #8b1a62);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
    }
    
    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    
    /* Admin Panel (Hidden by default) */
    .admin-panel {
      display: none;
      max-width: 1100px;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
    }
    
    .admin-header {
      background: linear-gradient(135deg, #b02e72, #8b1a62);
      color: white;
      padding: 1.5rem;
      text-align: center;
    }
    
    .admin-header h1 {
      margin: 0;
      font-size: 1.8rem;
    }
    
    .admin-header p {
      margin: 0.5rem 0 0;
      opacity: 0.9;
    }
    
    .logout-btn {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    
    /* Rest of admin styles remain same */
    .admin-content {
      padding: 2rem;
    }
    
    .add-product-form {
      background: #f8fafc;
      padding: 2rem;
      border-radius: 16px;
      margin-bottom: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
    }
    
    .form-group label {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #374151;
    }
    
    .form-group input,
    .form-group textarea,
    .form-group select {
      padding: 0.75rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #b02e72;
    }
    
    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    .file-preview {
      width: 120px;
      height: 90px;
      object-fit: cover;
      border-radius: 8px;
      margin-top: 0.5rem;
      border: 2px solid #e2e8f0;
    }
    
    .btn {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #b02e72, #8b1a62);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
    }
    
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    
    .product-item {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    
    .product-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    
    .product-thumb {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    
    .product-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    
    @media(max-width:768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      
      .admin-content {
        padding: 1rem;
      }
      
      .login-container {
        padding: 2rem 1.5rem;
        margin: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="loginScreen" class="login-container">
    <div class="login-logo">🔐</div>
    <h2 class="login-title">Admin Panel</h2>
    <p class="login-subtitle">Enter password to access Kartiki Resin Arts Admin</p>
    <input type="password" id="adminPassword" class="password-input" placeholder="Enter admin password" />
    <button class="login-btn" onclick="checkPassword()">Login →</button>
  </div>

  <!-- Admin Panel (Hidden initially) -->
  <div id="adminPanel" class="admin-panel">
    <div class="admin-header">
      <button class="logout-btn" onclick="logout()">Logout</button>
      <h1>Kartiki Resin Arts</h1>
      <p>Admin Dashboard - Manage Products</p>
    </div>
    
    <div class="admin-content">
      <!-- Add Product Form -->
      <div class="add-product-form">
        <h3 style="margin:0 0 1.5rem 0;color:#b02e72;">➕ Add New Product</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="productName" placeholder="e.g. Crystal Rose Coaster" />
          </div>
          <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" id="productPrice" placeholder="750" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Category</label>
            <select id="productCategory">
              <option value="">Select Category</option>
              <option value="Coasters">Coasters</option>
              <option value="Jewelry">Jewelry</option>
              <option value="Gifts">Custom Gifts</option>
              <option value="Home Decor">Home Decor</option>
              <option value="Pooja thali">Pooja Thali</option>
              <option value="New">New Arrival</option>
            </select>
          </div>
          <div class="form-group">
            <label>Upload Photo</label>
            <input type="file" id="productImage" accept="image/*" onchange="previewImage(this)" />
            <img id="imagePreview" class="file-preview" style="display:none;" />
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="productDesc" placeholder="Beautiful handmade resin art..."></textarea>
        </div>
        <button class="btn btn-primary" onclick="addProduct()" style="width:100%;">Add Product</button>
      </div>

      <!-- Products List -->
      <h3 style="color:#b02e72;margin-bottom:1.5rem;">📦 Your Products ({count})</h3>
      <div id="productsList" class="products-grid"></div>
      <button class="btn btn-danger" onclick="clearAllProducts()" style="margin-top:2rem;">
        🗑️ Clear All Products
      </button>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = "kartiki123"; // Change this password
    
    function checkPassword() {
      const input = document.getElementById("adminPassword");
      const btn = document.querySelector(".login-btn");
      
      if (!input.value) {
        alert("कृपया password टाका!");
        return;
      }
      
      btn.disabled = true;
      btn.textContent = "Checking...";
      
      setTimeout(() => {
        if (input.value === ADMIN_PASSWORD) {
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("adminPanel").style.display = "block";
          loadProducts();
        } else {
          alert("❌ Wrong Password!\nDefault: kartiki123");
          input.value = "";
          input.focus();
        }
        btn.disabled = false;
        btn.textContent = "Login →";
      }, 800);
    }
    
    function logout() {
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("adminPanel").style.display = "none";
      document.getElementById("adminPassword").value = "";
    }
    
    // Enter key support
    document.getElementById("adminPassword").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        checkPassword();
      }
    });
    
    function previewImage(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const preview = document.getElementById("imagePreview");
          preview.src = e.target.result;
          preview.style.display = "block";
        };
        reader.readAsDataURL(input.files[0]);
      }
    }
    
    function addProduct() {
      const name = document.getElementById("productName").value;
      const price = document.getElementById("productPrice").value;
      const category = document.getElementById("productCategory").value;
      const desc = document.getElementById("productDesc").value;
      const imageInput = document.getElementById("productImage");
      
      if (!name || !price) {
        alert("Name आणि Price भरायला आवश्यक आहे!");
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const products = getProducts();
        products.push({
          id: Date.now(),
          name,
          price: parseFloat(price),
          category,
          description: desc,
          image: e.target.result
        });
        saveProducts(products);
        loadProducts();
        resetForm();
        alert("✅ Product successfully added!");
      };
      
      if (imageInput.files[0]) {
        reader.readAsDataURL(imageInput.files[0]);
      } else {
        const products = getProducts();
        products.push({
          id: Date.now(),
          name,
          price: parseFloat(price),
          category,
          description: desc,
          image: null
        });
        saveProducts(products);
        loadProducts();
        resetForm();
        alert("✅ Product added without image!");
      }
    }
    
    function resetForm() {
      document.getElementById("productName").value = "";
      document.getElementById("productPrice").value = "";
      document.getElementById("productCategory").value = "";
      document.getElementById("productDesc").value = "";
      document.getElementById("productImage").value = "";
      document.getElementById("imagePreview").style.display = "none";
    }
    
    function getProducts() {
      const raw = localStorage.getItem("products");
      return raw ? JSON.parse(raw) : [];
    }
    
    function saveProducts(products) {
      localStorage.setItem("products", JSON.stringify(products));
    }
    
    function loadProducts() {
      const products = getProducts();
      const container = document.getElementById("productsList");
      const countEl = document.querySelector("h3");
      
      countEl.textContent = `📦 Your Products (${products.length})`;
      
      if (products.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#666;padding:3rem;">अजून products नाहीत. वरून Add करा! ✨</p>';
        return;
      }
      
      container.innerHTML = products.map(p => `
        <div class="product-item">
          <img src="${p.image || 'https://via.placeholder.com/300x200/b02e72/fff?text=No+Image'}" 
               alt="${p.name}" class="product-thumb">
          <h4 style="margin:0 0 0.5rem 0;color:#b02e72;">${p.name}</h4>
          <p><strong>₹${Number(p.price).toLocaleString('en-IN')}</strong></p>
          ${p.category ? `<p><em>${p.category}</em></p>` : ''}
          <div class="product-actions">
            <button class="btn btn-danger" onclick="deleteProduct(${p.id})" style="padding:0.5rem 1rem;font-size:0.8rem;">Delete</button>
          </div>
        </div>
      `).join('');
    }
    
    function deleteProduct(id) {
      if (confirm("हा product delete करायचा का?")) {
        const products = getProducts().filter(p => p.id !== id);
        saveProducts(products);
        loadProducts();
      }
    }
    
    function clearAllProducts() {
      if (confirm("सर्व products delete करायचे का? हे undo करता येणार नाही!")) {
        localStorage.removeItem('products');
        loadProducts();
      }
    }
  </script>
</body>
</html>
