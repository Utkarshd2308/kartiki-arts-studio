<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel - Kartiki Resin Arts</title>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  body{
    font-family:system-ui,-apple-system,sans-serif;
    background: linear-gradient(135deg, #fff4fb 0%, #fce8fb 100%);
    min-height:100vh;
    color:#333;
  }

  .page-wrap{
    max-width:1400px;
    margin:0 auto;
    padding:1.5rem;
  }

  /* HEADER */
  .admin-header{
    background: linear-gradient(135deg, #b02e72, #8b1a62);
    color:#fff;
    padding:2rem 1.5rem;
    border-radius:25px;
    text-align:center;
    margin-bottom:2.5rem;
    box-shadow:0 20px 60px rgba(176,46,114,0.4);
  }
  .admin-header h1{
    font-size:clamp(1.5rem, 4vw, 2.2rem);
    font-weight:800;
    margin-bottom:0.5rem;
  }
  .admin-header p{
    font-size:clamp(0.95rem, 2.5vw, 1.1rem);
    opacity:0.95;
    margin-bottom:1rem;
  }
  .admin-header .btn-container{
    display:flex;
    gap:1rem;
    justify-content:center;
    flex-wrap:wrap;
  }

  /* DASHBOARD CARDS */
  .dashboard-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
    gap:1.5rem;
    margin-bottom:2.5rem;
  }
  .dash-card{
    background:#fff;
    border-radius:20px;
    padding:2rem 1.5rem;
    box-shadow:0 15px 45px rgba(191,72,134,0.2);
    border:2px solid #f3d2f0;
    transition:all 0.3s ease;
    text-align:center;
  }
  .dash-card:hover{
    transform:translateY(-8px);
    box-shadow:0 25px 65px rgba(176,46,114,0.35);
    border-color:#b02e72;
  }
  .dash-icon{
    width:65px;
    height:65px;
    border-radius:50%;
    background:linear-gradient(135deg, #b02e72, #8b1a62);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:1.8rem;
    margin:0 auto 1rem auto;
  }
  .dash-number{
    font-size:clamp(1.8rem, 6vw, 2.5rem);
    font-weight:800;
    color:#b02e72;
    margin-bottom:0.3rem;
  }
  .dash-label{
    font-size:1rem;
    color:#9b1b63;
    font-weight:700;
  }

  /* MAIN SECTIONS */
  .section{
    background:#fff;
    border-radius:20px;
    padding:2.5rem 2rem;
    margin-bottom:2rem;
    box-shadow:0 15px 45px rgba(191,72,134,0.15);
    border:2px solid #f3d2f0;
  }
  .section-title{
    font-size:clamp(1.4rem, 4vw, 1.8rem);
    font-weight:800;
    color:#9b1b63;
    margin-bottom:1.5rem;
    display:flex;
    align-items:center;
    gap:0.8rem;
    flex-wrap:wrap;
  }

  /* ADD PRODUCT FORM */
  .product-form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
    gap:1.5rem;
    margin-bottom:2rem;
  }
  .form-group{
    display:flex;
    flex-direction:column;
    gap:0.5rem;
  }
  .form-label{
    font-weight:700;
    color:#555;
    font-size:clamp(0.85rem, 2.5vw, 0.95rem);
  }
  .form-input, .form-textarea, .form-select{
    padding:1rem 1.2rem;
    border:2px solid #f2c9e3;
    border-radius:12px;
    font-size:1rem;
    transition:all 0.3s ease;
    font-family:inherit;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus{
    outline:none;
    border-color:#b02e72;
    box-shadow:0 0 0 3px rgba(176,46,114,0.15);
  }
  .form-textarea{
    min-height:100px;
    resize:vertical;
  }
  .form-row-full{
    grid-column:1/-1;
  }

  /* BUTTONS */
  .btn{
    padding:clamp(0.8rem, 3vw, 1rem) clamp(1.5rem, 4vw, 2rem);
    border-radius:15px;
    font-weight:700;
    font-size:clamp(0.9rem, 3vw, 1.1rem);
    cursor:pointer;
    border:none;
    transition:all 0.3s ease;
    display:inline-flex;
    align-items:center;
    gap:0.7rem;
    text-decoration:none;
    justify-content:center;
    white-space:nowrap;
  }
  .btn-primary{
    background:linear-gradient(135deg, #b02e72, #8b1a62);
    color:#fff;
    box-shadow:0 10px 30px rgba(176,46,114,0.4);
  }
  .btn-primary:hover,.btn-primary:active{
    transform:translateY(-3px);
    box-shadow:0 18px 40px rgba(176,46,114,0.5);
  }
  .btn-secondary{
    background:#fff;
    color:#b02e72;
    border:3px solid #f2c9e3;
    font-weight:800;
  }
  .btn-secondary:hover,.btn-secondary:active{
    background:#b02e72;
    color:#fff;
    transform:translateY(-2px);
  }
  .btn-danger{
    background:#f44336;
    color:#fff;
  }
  .btn-danger:hover,.btn-danger:active{
    background:#d32f2f;
    transform:translateY(-2px);
  }

  /* PRODUCTS TABLE */
  .products-table-wrapper{
    overflow-x:auto;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    margin-top:1.5rem;
  }
  .products-table{
    width:100%;
    min-width:600px;
    border-collapse:collapse;
    background:#fff;
  }
  .products-table th{
    background:linear-gradient(135deg, #b02e72, #8b1a62);
    color:#fff;
    padding:1.2rem 1rem;
    text-align:left;
    font-weight:700;
    font-size:0.95rem;
    position:sticky;
    top:0;
    z-index:10;
  }
  .products-table td{
    padding:1.2rem 1rem;
    border-bottom:1px solid #f3d2f0;
    vertical-align:top;
  }
  .products-table tr:hover{
    background:rgba(176,46,114,0.05);
  }
  .price-badge{
    background:linear-gradient(135deg, #fff5fd, #ffe8f5);
    color:#b02e72;
    padding:0.4rem 0.8rem;
    border-radius:20px;
    font-weight:700;
    font-size:0.9rem;
    white-space:nowrap;
  }
  .action-buttons{
    display:flex;
    gap:0.5rem;
    flex-wrap:wrap;
  }
  .no-products{
    text-align:center;
    padding:3rem 1rem;
    color:#999;
  }

  /* SECTION HEADER */
  .section-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:1.5rem;
    flex-wrap:wrap;
    gap:1rem;
  }

  /* RESPONSIVE IMPROVEMENTS */
  @media(max-width:1024px){
    .page-wrap{padding:1.25rem;}
    .dashboard-grid{grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:1.25rem;}
  }
  
  @media(max-width:768px){
    .page-wrap{padding:1rem;}
    .admin-header{padding:1.5rem 1.25rem;}
    .section{padding:1.75rem 1.5rem;}
    .dashboard-grid{grid-template-columns:repeat(2, 1fr); gap:1rem;}
    .product-form-grid{grid-template-columns:1fr; gap:1.25rem;}
  }
  
  @media(max-width:480px){
    .page-wrap{padding:0.75rem;}
    .admin-header{padding:1.25rem 1rem;}
    .admin-header .btn-container{flex-direction:column; width:100%;}
    .admin-header .btn{flex:1;}
    .section{padding:1.5rem 1.25rem;}
    .dashboard-grid{grid-template-columns:1fr; gap:1rem;}
    .products-table th, .products-table td{padding:1rem 0.75rem;}
    .products-table{font-size:0.9rem;}
    .section-header{flex-direction:column; align-items:stretch;}
  }
  
  @media(max-width:360px){
    .products-table th, .products-table td{padding:0.75rem 0.5rem;}
    .dash-card{padding:1.5rem 1rem;}
  }

  /* TOUCH FRIENDLY */
  @media(hover: none) and (pointer: coarse){
    .btn:active{transform:translateY(-2px) scale(0.98);}
    .dash-card:active{transform:translateY(-4px);}
  }
</style>
</head>
<body>
<div class="page-wrap">

  <!-- HEADER -->
  <header class="admin-header">
    <h1>🔐 Admin Dashboard</h1>
    <p>Kartiki Resin Arts - Manage Products & Orders</p>
    <div class="btn-container">
      <button class="btn btn-secondary" onclick="window.location.href='index.html'">
        🏠 Back to Website
      </button>
      <button class="btn btn-primary" onclick="refreshData()">
        🔄 Refresh Data
      </button>
    </div>
  </header>

  <!-- DASHBOARD STATS -->
  <div class="dashboard-grid">
    <div class="dash-card">
      <div class="dash-icon">🛍️</div>
      <div class="dash-number" id="totalProducts">0</div>
      <div class="dash-label">Total Products</div>
    </div>
    <div class="dash-card">
      <div class="dash-icon">📦</div>
      <div class="dash-number" id="totalCategories">0</div>
      <div class="dash-label">Categories</div>
    </div>
    <div class="dash-card">
      <div class="dash-icon">💰</div>
      <div class="dash-number" id="totalRevenue">₹0</div>
      <div class="dash-label">Total Value</div>
    </div>
    <div class="dash-card">
      <div class="dash-icon">📊</div>
      <div class="dash-number" id="totalVisitors">0</div>
      <div class="dash-label">Products Added</div>
    </div>
  </div>

  <!-- ADD NEW PRODUCT -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">➕ Add New Product</h2>
    </div>
    <form id="addProductForm" class="product-form-grid">
      <div class="form-group">
        <label class="form-label">Product Name *</label>
        <input type="text" id="productName" class="form-input" required 
               placeholder="Ex: Ocean Wave Coaster Set" maxlength="100">
      </div>
      <div class="form-group">
        <label class="form-label">Price (₹) *</label>
        <input type="number" id="productPrice" class="form-input" required 
               placeholder="499" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Category *</label>
        <select id="productCategory" class="form-select" required>
          <option value="">Select Category</option>
          <option value="coasters">☕ Coasters</option>
          <option value="jewellery">💍 Jewellery</option>
          <option value="keychains">🔗 Keychains</option>
          <option value="pooja thali">🛕 Pooja Thali</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Image URL</label>
        <input type="url" id="productImage" class="form-input" 
               placeholder="https://example.com/image.jpg">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="productDescription" class="form-textarea" 
                  placeholder="Enter product details, features, size, material etc..."
                  maxlength="500"></textarea>
      </div>
      <div class="form-row-full">
        <button type="submit" class="btn btn-primary">✅ Add Product Now</button>
      </div>
    </form>
  </section>

  <!-- PRODUCTS LIST -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">📋 All Products</h2>
      <button class="btn btn-danger" onclick="clearAllProducts()">🗑️ Clear All Products</button>
    </div>
    <div class="products-table-wrapper">
      <table class="products-table" id="productsTable">
        <thead>
          <tr>
            <th>Preview</th>
            <th>Name</th>
            <th>Price</th>
            <th>Category</th>
            <th>Description</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="productsTableBody">
          <tr>
            <td colspan="6" class="no-products">
              🚀 Add your first product using the form above!
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

</div>

<script>
  const STORAGE_KEY = "kartiki_products";

  // Load products
  function loadProducts(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){
      console.error("Error loading products:", e);
      return [];
    }
  }

  // Save products
  function saveProducts(products){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
    renderDashboard();
    renderProductsTable();
  }

  // Add product
  document.getElementById('addProductForm').addEventListener('submit', function(e){
    e.preventDefault();
    
    const product = {
      id: Date.now(),
      name: document.getElementById('productName').value.trim(),
      price: parseFloat(document.getElementById('productPrice').value),
      category: document.getElementById('productCategory').value,
      image: document.getElementById('productImage').value.trim() || '',
      description: document.getElementById('productDescription').value.trim()
    };

    const products = loadProducts();
    products.push(product);
    saveProducts(products);

    // Reset form with success feedback
    this.reset();
    const submitBtn = this.querySelector('.btn-primary');
    const originalText = submitBtn.textContent;
    submitBtn.textContent = '✅ Added!';
    submitBtn.style.background = '#4CAF50';
    setTimeout(() => {
      submitBtn.textContent = originalText;
      submitBtn.style.background = '';
    }, 2000);
  });

  // Delete product
  function deleteProduct(id){
    if(confirm('🗑️ Are you sure you want to delete this product?')){
      const products = loadProducts();
      const updated = products.filter(p => p.id !== id);
      saveProducts(updated);
    }
  }

  // Render dashboard stats
  function renderDashboard(){
    const products = loadProducts();
    const categories = [...new Set(products.map(p => p.category).filter(Boolean))];
    
    document.getElementById('totalProducts').textContent = products.length;
    document.getElementById('totalCategories').textContent = categories.length || 0;
    document.getElementById('totalRevenue').textContent = 
      '₹' + products.reduce((sum, p) => sum + (p.price || 0), 0).toLocaleString('en-IN');
    document.getElementById('totalVisitors').textContent = products.length;
  }

  // Render products table
  function renderProductsTable(){
    const products = loadProducts();
    const tbody = document.getElementById('productsTableBody');
    
    if(products.length === 0){
      tbody.innerHTML = `
        <tr>
          <td colspan="6" class="no-products">
            🚀 <strong>Add your first product</strong> using the form above!<br>
            <small>Products will appear here and on your main website instantly.</small>
          </td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = products.map(product => `
      <tr>
        <td>
          <img src="${product.image || 'https://via.placeholder.com/60x60/b02e72/fff?text=R'}" 
               alt="${product.name}" 
               style="width:50px;height:50px;border-radius:10px;object-fit:cover;border:2px solid #f3d2f0;">
        </td>
        <td>
          <strong>${product.name}</strong>
          <br><small style="color:#999;">ID: ${product.id}</small>
        </td>
        <td><span class="price-badge">₹${Number(product.price).toLocaleString('en-IN')}</span></td>
        <td style="font-weight:600;color:#9b1b63;">${product.category}</td>
        <td>${(product.description || 'No description').substring(0, 60)}${(product.description || '').length > 60 ? '...' : ''}</td>
        <td>
          <div class="action-buttons">
            <button class="btn btn-danger" style="padding:0.5rem 1rem;font-size:0.85rem;" 
                    onclick="deleteProduct(${product.id})">
              🗑️ Delete
            </button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // Clear all products
  function clearAllProducts(){
    if(confirm('⚠️ Delete ALL products? This action cannot be undone!\n\nAll products will be permanently removed from your website.')){
      localStorage.removeItem(STORAGE_KEY);
      renderDashboard();
      renderProductsTable();
    }
  }

  // Refresh data
  function refreshData(){
    renderDashboard();
    renderProductsTable();
  }

  // Initialize
  document.addEventListener('DOMContentLoaded', function(){
    renderDashboard();
    renderProductsTable();
  });
</script>
</body>
</html>
