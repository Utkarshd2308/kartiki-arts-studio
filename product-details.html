<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details - Kartiki Resin Arts</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#fff4fb 0%,#fce8fb 100%);min-height:100vh;padding:1rem;color:#333;line-height:1.6;}
    .container{max-width:1200px;margin:0 auto;}
    
    .back-btn{position:fixed;top:20px;left:20px;z-index:100;background:#ff6b9d;color:white;padding:12px 20px;border-radius:50px;font-weight:600;box-shadow:0 8px 25px rgba(255,107,157,0.4);transition:all 0.3s;text-decoration:none;}
    .back-btn:hover{transform:translateY(-2px);box-shadow:0 12px 35px rgba(255,107,157,0.6);}
    
    .loading{display:flex;justify-content:center;align-items:center;height:100vh;}
    .spinner{width:50px;height:50px;border:4px solid #f3f3f3;border-top:4px solid #ff6b9d;border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
    
    .product-details{display:none;padding:20px 0;}
    .product-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start;}
    
    .product-images{position:sticky;top:100px;}
    .main-image{width:100%;height:400px;object-fit:cover;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.15);margin-bottom:1rem;}
    .gallery{display:flex;gap:0.5rem;}
    .gallery img{width:70px;height:70px;object-fit:cover;border-radius:12px;cursor:pointer;border:3px solid transparent;transition:all 0.3s;}
    .gallery img.active{border-color:#ff6b9d;transform:scale(1.1);}
    
    .product-info h1{font-size:2.2rem;font-weight:800;color:#2d1b69;margin-bottom:0.5rem;}
    .product-price{font-size:2rem;font-weight:900;color:#ff6b9d;margin:1rem 0;}
    .product-category{background:#e8d5f1;color:#6b46c1;padding:8px 16px;border-radius:25px;font-weight:600;display:inline-block;margin-bottom:1rem;}
    
    .product-description{font-size:1.1rem;color:#555;line-height:1.8;margin:1.5rem 0;}
    
    /* Order Form */
    .order-section{background:white;border-radius:20px;padding:2rem;box-shadow:0 20px 60px rgba(0,0,0,0.1);margin-top:2rem;}
    .order-section h3{font-size:1.4rem;color:#2d1b69;margin-bottom:1.5rem;}
    
    .form-group{margin-bottom:1.5rem;}
    .form-group label{display:block;font-weight:600;color:#555;margin-bottom:0.5rem;}
    .form-group input{padding:14px 16px;border:2px solid #e8d5f1;border-radius:12px;font-size:1rem;width:100%;transition:all 0.3s;}
    .form-group input:focus{outline:none;border-color:#ff6b9d;box-shadow:0 0 0 3px rgba(255,107,157,0.1);}
    
    .quantity-group{display:flex;gap:1rem;align-items:center;}
    .quantity-btn{background:#ff6b9d;color:white;border:none;width:45px;height:45px;border-radius:50%;font-size:1.2rem;font-weight:700;cursor:pointer;transition:all 0.3s;}
    .quantity-btn:hover{transform:scale(1.1);}
    
    /* Buttons */
    .btn-order{background:linear-gradient(135deg,#ff6b9d,#ff1493);color:white;padding:16px 30px;border:none;border-radius:50px;font-size:1.1rem;font-weight:700;cursor:pointer;box-shadow:0 10px 30px rgba(255,107,157,0.4);transition:all 0.3s;width:100%;margin-top:1rem;}
    .btn-order:hover{transform:translateY(-3px);box-shadow:0 15px 40px rgba(255,107,157,0.6);}
    .btn-order:disabled{background:#ccc;cursor:not-allowed;transform:none;}
    
    .btn-whatsapp{background:#25D366;color:white;padding:16px 30px;border:none;border-radius:50px;font-size:1.1rem;font-weight:700;cursor:pointer;box-shadow:0 10px 30px rgba(37,211,102,0.4);transition:all 0.3s;width:100%;margin-top:1rem;display:none;}
    .btn-whatsapp:hover{transform:translateY(-3px);box-shadow:0 15px 40px rgba(37,211,102,0.6);}
    
    .status-bar{display:flex;gap:1rem;margin:1.5rem 0;font-size:0.95rem;color:#666;}
    .status-item{display:flex;align-items:center;gap:0.5rem;}
    
    /* Success Message */
    .success-message{display:none;background:#d4edda;color:#155724;padding:1rem;border-radius:12px;margin:1rem 0;border-left:5px solid #28a745;}
    
    /* Responsive */
    @media (max-width:768px){
      .back-btn{top:15px;left:15px;padding:10px 16px;font-size:0.9rem;}
      .product-grid{grid-template-columns:1fr;gap:1.5rem;}
      .product-images{order:2;}
      .product-info{order:1;}
      .product-info h1{font-size:1.8rem;}
      .product-price{font-size:1.6rem;}
      .main-image{height:300px;}
      .order-section{padding:1.5rem;}
    }
    
    @media (max-width:480px){
      body{padding:0.5rem;}
      .main-image{height:250px;}
      .gallery img{width:50px;height:50px;}
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">← Back to Home</a>
  
  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>
  
  <div class="container" id="productDetails">
    <div class="product-grid">
      <div class="product-images">
        <img id="mainImage" class="main-image" src="" alt="Product">
        <div class="gallery" id="imageGallery"></div>
      </div>
      
      <div class="product-info">
        <h1 id="productName"></h1>
        <div class="product-price" id="productPrice">₹0</div>
        <div class="product-category" id="productCategory"></div>
        
        <div class="status-bar">
          <div class="status-item">✅ In Stock</div>
          <div class="status-item">🚚 Free Delivery</div>
          <div class="status-item">⭐ 4.8 Rating</div>
        </div>
        
        <div class="product-description" id="productDescription"></div>
        
        <!-- Order Form -->
        <div class="order-section">
          <h3>📋 Fill Order Details</h3>
          
          <form id="orderForm">
            <div class="form-group">
              <label>👤 Full Name</label>
              <input type="text" id="customerName" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
              <label>📱 Phone Number</label>
              <input type="tel" id="customerPhone" placeholder="e.g. 9876543210" required>
            </div>
            
            <div class="form-group">
              <label>📦 Quantity</label>
              <div class="quantity-group">
                <button type="button" class="quantity-btn" onclick="updateQuantity(-1)">−</button>
                <input type="number" id="quantity" value="1" min="1" max="10" style="width:80px;text-align:center;">
                <button type="button" class="quantity-btn" onclick="updateQuantity(1)">+</button>
              </div>
            </div>
            
            <div class="form-group">
              <label>📍 Delivery Address</label>
              <input type="text" id="deliveryAddress" placeholder="House no, street, city, pincode" required>
            </div>
            
            <div class="success-message" id="successMsg">✅ Form filled! Click Order Now to send WhatsApp message</div>
            
            <button type="submit" class="btn-order" id="orderBtn">🛒 Order Now</button>
            <button class="btn-whatsapp" id="whatsappBtn">💬 Send WhatsApp Order</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    let currentProduct = null;
    
    function loadProduct() {
      try {
        const productsData = localStorage.getItem('kartiki_products') || localStorage.getItem('products');
        const products = productsData ? JSON.parse(productsData) : [];
        currentProduct = products.find(p => p.id == productId);
        
        if (!currentProduct) {
          alert('Product not found!');
          window.location.href = 'index.html';
          return;
        }
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('productDetails').style.display = 'block';
        
        document.getElementById('productName').textContent = currentProduct.name;
        document.getElementById('productPrice').textContent = `₹${currentProduct.price}`;
        document.getElementById('productCategory').textContent = currentProduct.category;
        document.getElementById('productDescription').textContent = currentProduct.description;
        
        const mainImg = document.getElementById('mainImage');
        mainImg.src = currentProduct.image || 'https://via.placeholder.com/400x400/ff6b9d/ffffff?text=No+Image';
        mainImg.onerror = () => mainImg.src = 'https://via.placeholder.com/400x400/ff6b9d/ffffff?text=No+Image';
        
        document.getElementById('imageGallery').innerHTML = 
          `<img src="${currentProduct.image}" alt="Product" class="active" onclick="changeMainImage(this.src)">`;
        
      } catch (error) {
        console.error('Error:', error);
        window.location.href = 'index.html';
      }
    }
    
    function changeMainImage(src) {
      document.getElementById('mainImage').src = src;
      document.querySelectorAll('.gallery img').forEach(img => img.classList.remove('active'));
      event.target.classList.add('active');
    }
    
    function updateQuantity(change) {
      const qty = document.getElementById('quantity');
      let newQty = parseInt(qty.value) + change;
      newQty = Math.max(1, Math.min(10, newQty));
      qty.value = newQty;
    }
    
    function sendWhatsAppOrder() {
      const name = document.getElementById('customerName').value;
      const phone = document.getElementById('customerPhone').value;
      const quantity = document.getElementById('quantity').value;
      const address = document.getElementById('deliveryAddress').value;
      
      const totalPrice = (currentProduct.price * quantity);
      
      const message = `🛒 *NEW ORDER - Kartiki Resin Arts*

👤 *Customer:* ${name}
📱 *Phone:* ${phone}
📦 *Product:* ${currentProduct.name}
🎨 *Category:* ${currentProduct.category}
📏 *Quantity:* ${quantity}
💰 *Price per item:* ₹${currentProduct.price}
💎 *Total Amount:* ₹${totalPrice}

📍 *Delivery Address:* ${address}

⏰ *Order Time:* ${new Date().toLocaleString('en-IN')}

Please confirm order & delivery date! 🙏`;

      const whatsappUrl = `https://wa.me/919123456789?text=${encodeURIComponent(message)}`; // Change number
      window.open(whatsappUrl, '_blank');
      
      // Reset form
      document.getElementById('orderForm').reset();
      document.getElementById('quantity').value = '1';
    }
    
    // Form handling
    document.getElementById('orderForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const successMsg = document.getElementById('successMsg');
      const orderBtn = document.getElementById('orderBtn');
      const whatsappBtn = document.getElementById('whatsappBtn');
      
      successMsg.style.display = 'block';
      orderBtn.style.display = 'none';
      whatsappBtn.style.display = 'block';
      whatsappBtn.scrollIntoView({ behavior: 'smooth' });
    });
    
    document.getElementById('whatsappBtn').addEventListener('click', sendWhatsAppOrder);
    
    document.addEventListener('DOMContentLoaded', loadProduct);
  </script>
</body>
</html>
